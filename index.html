<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Management Portal</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #111; max-width: 450px; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .car-img { width: 100%; border-radius: 10px; margin: 15px 0; }
        .progress-bar { background: #333; border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden; display: none; }
        #fill { height: 100%; width: 0%; background: #27ae60; line-height: 25px; font-size: 12px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block; }
        .wa-btn { background: #25d366; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CONGRATULATIONS BARBARA! 🎈</h1>
        <p>Portland | +1 503-341-8090</p>
        <img src="IMG_0982.jpeg" alt="Tesla" class="car-img">
        <p>The Tesla Management Team, SpaceX, and xAI families congratulate you on your $50,000.00 and new Tesla win!</p>
        
        <button id="claim" class="btn" onclick="start()">Claim My Package 📦</button>
        
        <div id="p-bar" class="progress-bar"><div id="fill">0%</div></div>
        
        <a id="wa" href="https://wa.me/17793519071?text=Welcome%20to%20Tesla%2C%20SpaceX%2C%20and%20xAI%20Management%20%26%20Giveaway%20Team." class="btn wa-btn">Get Packages 📦</a>
    </div>

    <script>
        function start() {
            document.getElementById('claim').style.display = 'none';
            document.getElementById('p-bar').style.display = 'block';
            let fill = document.getElementById('fill');
            let w = 0;
            let iv = setInterval(() => {
                if (w >= 100) {
                    clearInterval(iv);
                    document.getElementById('p-bar').style.display = 'none';
                    document.getElementById('wa').style.display = 'inline-block';
                } else {
                    w++;
                    fill.style.width = w + '%';
                    fill.innerText = w + '%';
                }
            }, 40);
        }
    </script>
</body>
</html>
